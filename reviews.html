<!DOCTYPE html>
<html lang="en">
    <!--Header-->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pinkerton Comics - Reviews</title>
        <script src="https://kit.fontawesome.com/a59c1fbfa4.js" crossorigin="anonymous"></script>
        <link rel="shortcut icon" href="./resources/images/favicon (1).ico" type="image/x-icon">
        <link rel="icon" href="./resources/images/favicon (1).ico" type="image/x-icon">
        <link href="./resources/css/style.css" type="text/css" rel="stylesheet">
        <script src="./resources/javascript/main.js"></script>
    </head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <a href="./index.html"><img class="logo" src="./resources/images/PC_comics_logo_no_back.png" alt="Pinkerton Comics Logo" width="100px"/></a>
        <header>
            <h1>Pinkerton Comics - Reviews</h1>
            <nav aria-label="Main">
                <a href="./store_locations.html" aria-label="View our store locations"><i class="fa-solid fa-shop stores" aria-hidden="true"></i></a>
                <a href="./reviews.html" aria-label="Write a review"><i class="fa-solid fa-pen reviews" aria-hidden="true"></i></a>
                <a href="./news.html" aria-label="View news"><i class="fa-regular fa-newspaper news" aria-hidden="true"></i></a>
            </nav>
        </header>
        <main id="main-content">
            <h2 class="reviews-header">Please Leave a Review!</h2>
            <p>Please view our <a href="./posting_guidlines.html">posting guidlines</a> before you post your review.</p>
            <!--Review form-->
            <form class='review-form' action="./review_submitted.html" method="POST">
                <h3>We would love to hear your thoughts on our comics! Please share your review below:</h3>
                <!--Name-->
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required><br>
                <!--Comic Title-->
                <label for="comic">Comic Title:</label>
                <select id="comic" name="comic">
                    <option value="the_cricket">The Cricket</option>
                    <option value="night_owl">Night Owl</option>
                    <option value="ibb">The Incredible Bunny Boy</option>
                </select> <br>
                <!--Star Rating-->
                <label for="rating">Your Rating in Stars:</label>
                <select id="rating" name="rating">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select> <br>
                <!--Review Text-->
                <label for="review">Your Review:</label><br>
                <textarea id="review" name="review" rows="7" cols="50" placeholder="Write your review here..." required></textarea><br>
                <!--Submit Button-->
                <input type="submit" value="Submit Your Review!">
            </form>
        </main>
    <!--Footer-->
        <footer>
            <p class="footer">&copy;2026 Pinkerton Comics. All rights reserved.</p>
        </footer>
    </body>
</html>
